# Experiment config. Run name: NR1_[Env]_[Setting]_[Seed].

experiment:
  group_id: NR1
  setting: RLPD          # RLPD | SACfD | IQL | ablation-<name>
  seed: 0

wandb:
  entity: fryan-nr       # shared team
  project: NR1
  mode: online           # use "offline" for local tests

env:
  id: Hopper-v5

dataset:
  quality: expert          # medium | simple | expert (Minari); minari_id overrides if set

# IQL baseline (Kostrikov et al. 2021)
iql:
  expectile: 0.7
  beta: 3.0
  tau: 0.005
  adv_clip: 100.0
  offline_pretrain_steps: 1000000

# RLPD core (paper Table 1)
algo:
  gamma: 0.99
  learning_rate: 3.0e-4
  batch_online: 128
  batch_offline: 128
  symmetric_sampling_ratio: 0.5
  ensemble_size: 10
  critic_ema_rho: 0.005
  utd: 20
  hidden_width: 256
  layernorm: true
  init_entropy_temp: 1.0
  target_entropy_scale: -0.5

# Per-environment knobs (paper Table 2), locomotion defaults
env_specific:
  cdq: true
  entropy_backups: true
  num_layers: 2

training:
  total_env_steps: 250000
  start_steps: 5000
  eval_every_steps: 5000
  eval_episodes: 10
  checkpoint_every_steps: 10000  # 0 disables; resume with `run.py --resume`
  checkpoint_dir: checkpoints
